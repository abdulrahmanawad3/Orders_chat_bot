<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Clucky's — Crispy Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="../static/styles/chat.css" rel="stylesheet">
</head>

<body>

    <div class="app-wrap">

        <div class="shell">
            <div class="header">
                <div class="header-bg">
                    <div class="logo-wrap">🍗</div>
                    <div class="header-info">
                        <div class="brand-name">Chicken Kickers</div>
                        <div class="brand-tag">CRISPY CHICKEN CO.</div>
                        <div class="status-pill"><span class="dot"></span> We're here to help!</div>
                    </div>
                    <!-- NEW: eval button sits beside clear -->
                    <button class="eval-btn" id="eval-btn" title="Evaluate last response">⚖️</button>
                    <button class="clear-btn" id="clear-btn" title="Clear chat">✕</button>
                </div>
                <div class="tagline-strip">🔥 HOT &amp; CRISPY &nbsp;·&nbsp; ALWAYS FRESH &nbsp;·&nbsp; ORDER NOW 🔥
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="empty" id="empty-state">
                    <div class="empty-icon">🍗</div>
                    <div class="empty-title">What can I get ya?</div>
                    <div class="empty-sub">Ask about our menu, deals, locations, or anything chicken!</div>
                    <div class="chips">
                        <button class="chip" onclick="fillInput('What\'s on the menu?')">🍽️ See Menu</button>
                        <button class="chip" onclick="fillInput('Any deals today?')">🔥 Today\'s Deals</button>
                        <button class="chip" onclick="fillInput('Find nearest location')">📍 Find Us</button>
                        <button class="chip" onclick="fillInput('Tell me about the spicy bucket')">🌶️ Spicy
                            Bucket</button>
                        <button class="chip" onclick="fillInput('Do you have allergen info?')">🥜 Allergens</button>
                    </div>
                </div>
            </div>

            <div class="input-bar">
                <textarea id="user-input" placeholder="Ask about our menu, deals, locations…" rows="1"
                    autocomplete="off"></textarea>
                <button class="send-btn" id="send-btn" title="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Eval side panel -->
        <div class="eval-panel" id="eval-panel">
            <div class="eval-panel-header">
                <span class="eval-panel-title">⚖️ QA Evaluation</span>
                <button class="eval-close" id="eval-close">✕</button>
            </div>
            <div class="eval-body" id="eval-body">
                <div class="eval-idle">
                    <div class="eval-idle-icon">🔍</div>
                    <div class="eval-idle-text">Press ⚖️ after a reply<br>to evaluate the last response.</div>
                </div>
            </div>
        </div>

    </div>

    <script src="../static/scripts/chat.js"></script>
</body>

</html>
